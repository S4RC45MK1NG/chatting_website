<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat UI</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1d2939;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #eef2ff 0%, #f5f7fb 100%);
    }
    .chat-app {
      width: min(100%, 720px);
      height: min(100%, 820px);
      max-height: 100vh;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(17, 24, 39, 0.12);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .header {
      padding: 24px 28px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .header h1 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }
    .header p {
      margin: 0;
      font-size: 0.95rem;
      color: #64748b;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #f8fafc;
      border-radius: 999px;
      font-size: 0.88rem;
      color: #0f172a;
    }
    .status::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #34d399;
      display: inline-block;
    }
    .messages {
      padding: 24px 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }
    .message {
      max-width: 78%;
      line-height: 1.65;
      padding: 16px 18px;
      border-radius: 24px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      position: relative;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: #ffffff;
      border-bottom-right-radius: 6px;
    }
    .message.assistant {
      align-self: flex-start;
      background: #f8fafc;
      color: #1f2937;
      border-bottom-left-radius: 6px;
    }
    .message small {
      display: block;
      margin-top: 8px;
      font-size: 0.78rem;
      color: inherit;
      opacity: 0.72;
    }
    .message.user small {
      opacity: 0.82;
    }
    .input-row {
      padding: 18px 28px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 12px;
      align-items: center;
      background: #ffffff;
    }
    .input-row textarea {
      flex: 1;
      min-height: 52px;
      max-height: 140px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid #d1d5db;
      resize: vertical;
      font-size: 0.98rem;
      line-height: 1.5;
      color: #111827;
      background: #f8fafc;
    }
    .input-row textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }
    .input-row button {
      border: none;
      border-radius: 18px;
      padding: 14px 18px;
      background: #2563eb;
      color: white;
      font-size: 0.98rem;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease;
    }
    .input-row button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }
    .input-row button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>
  <main class="chat-app" aria-label="Chat interface">
    <section class="header">
      <div>
        <h1>Chat Interface</h1>
        <p>Start typing to send messages in the conversation.</p>
      </div>
      <span class="status">Online</span>
    </section>

    <section class="messages" id="messageList" aria-live="polite" aria-label="Message thread">
      <article class="message assistant">
        <strong>Assistant</strong>
        <p>Welcome! Type a message below and press Send or Enter.</p>
        <small>Just a demo chat interface.</small>
      </article>
    </section>

    <section class="input-row">
      <textarea id="chatInput" placeholder="Write your message..." rows="1"></textarea>
      <button id="sendButton" type="button">Send</button>
    </section>
  </main>

  <script type="module" src="index.js"></script>
</body>
</html>
