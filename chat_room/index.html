<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat UI</title>

  <link id="themeStyle" rel="stylesheet" href="light.css">

</head>
<body>
  <button class="mode-switch" id="mode-switch" data-theme="light">☀️</button>
  <div class="chat-layout">
    <main class="chat-app" aria-label="Chat interface">
      <section class="header">
        <div>
          <h1>Chat Interface</h1>
          <p>Start typing to send messages in the conversation.</p>
        </div>
        <span class="status" id="status">Offline</span>
      </section>

      <section class="messages" id="messageList" aria-live="polite" aria-label="Message thread">
      </section>

      <section class="input-row">
        <textarea id="chatInput" placeholder="Write your message..." rows="1"></textarea>
        <button id="mediaButton" type="button">+</button>
        <button id="sendButton" type="button">Send</button>
      </section>
    </main>

    <aside class="user-panel" aria-label="Current user">
      <div class="user-avatar" id="userAvatar">U</div>
      <div class="user-details">
        <h2 id="userNameDisplay">Username</h2>
        <p>Active in this room</p>
      </div>
    </aside>
  </div>

  <input type="file" id="mediaInput" accept="image/*,video/*,audio/*" hidden>
  
  <script type="module" src="index.js"></script>
</body>
</html>
