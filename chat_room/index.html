<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat UI</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1d2939;
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      background: #0f172a;
      color: #f1f5f9;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #eef2ff 0%, #f5f7fb 100%);
      transition: background 0.3s ease;
    }
    body[data-theme="dark"] {
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    }
    .chat-app {
      width: min(100%, 720px);
      height: min(100%, 820px);
      max-height: 100vh;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(17, 24, 39, 0.12);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      position: relative;
    }
    .chat-app[data-theme="dark"] {
      background: #1e293b;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    }
    .mode-switch {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 100;
    }
    .theme-toggle {
      width: 56px;
      height: 28px;
      background: #e5e7eb;
      border: 2px solid #d1d5db;
      border-radius: 999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 2px;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .theme-toggle:hover {
      border-color: #9ca3af;
    }
    .theme-toggle.dark {
      background: #1e293b;
      border-color: #475569;
    }
    .theme-toggle-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
      font-size: 16px;
    }
    .theme-toggle-icon.light {
      transform: translateX(0);
    }
    .theme-toggle-icon.dark {
      transform: translateX(28px);
    }
    .header {
      padding: 24px 28px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: border-color 0.3s ease;
    }
    [data-theme="dark"] .header {
      border-bottom-color: #334155;
    }
    .header h1 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }
    .header p {
      margin: 0;
      font-size: 0.95rem;
      color: #64748b;
      transition: color 0.3s ease;
    }
    [data-theme="dark"] .header p {
      color: #94a3b8;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #f8fafc;
      border-radius: 999px;
      font-size: 0.88rem;
      color: #0f172a;
      transition: background 0.3s ease, color 0.3s ease;
    }
    [data-theme="dark"] .status {
      background: #334155;
      color: #f1f5f9;
    }
    .status::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #d33e34;
      display: inline-block;
    }
    .messages {
      padding: 24px 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      transition: background 0.3s ease;
    }
    [data-theme="dark"] .messages {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    }
    .message {
      max-width: 78%;
      line-height: 1.65;
      padding: 16px 18px;
      border-radius: 24px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      position: relative;
      word-wrap: break-word;
      transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    }
    .message.assistant {
      background: #f1f5f9;
      color: #111827;
    }
    [data-theme="dark"] .message.assistant {
      background: #334155;
      color: #f1f5f9;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
    }
    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: #ffffff;
      border-bottom-right-radius: 6px;
    }
    .message small {
      display: block;
      margin-top: 8px;
      font-size: 0.78rem;
      color: inherit;
      opacity: 0.72;
    }
    .message.user small {
      opacity: 0.82;
    }
    .input-row {
      padding: 18px 28px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 12px;
      align-items: center;
      background: #ffffff;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    [data-theme="dark"] .input-row {
      background: #1e293b;
      border-top-color: #334155;
    }
    .input-row textarea {
      flex: 1;
      min-height: 52px;
      max-height: 140px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid #d1d5db;
      resize: vertical;
      font-size: 0.98rem;
      line-height: 1.5;
      color: #111827;
      background: #f8fafc;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    [data-theme="dark"] .input-row textarea {
      background: #0f172a;
      color: #f1f5f9;
      border-color: #475569;
    }
    [data-theme="dark"] .input-row textarea::placeholder {
      color: #94a3b8;
    }
    .input-row textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }
    [data-theme="dark"] .input-row textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
    }
    .input-row button {
      border: none;
      border-radius: 18px;
      padding: 14px 18px;
      background: #2563eb;
      color: white;
      font-size: 0.98rem;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease;
    }
    .input-row button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }
    .input-row button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
      transform: none;
    }
    [data-theme="dark"] .input-row button {
      background: #3b82f6;
    }
    [data-theme="dark"] .input-row button:hover {
      background: #2563eb;
    }
    [data-theme="dark"] .input-row button:disabled {
      background: #1e40af;
    }
  </style>
</head>
<body>
  <main class="chat-app" aria-label="Chat interface">
    <section class="mode-switch">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="theme-toggle-icon light">☀️</span>
        <span class="theme-toggle-icon dark">🌙</span>
      </button>
    </section>
    
    <section class="header">
      <div>
        <h1>Chat Interface</h1>
        <p>Start typing to send messages in the conversation.</p>
      </div>
      <span class="status">Offline</span>
    </section>

    <section class="messages" id="messageList" aria-live="polite" aria-label="Message thread">
      <article class="message assistant">
        <strong>Assistant</strong>
        <p>Welcome! Type a message below and press Send or Enter.</p>
        <small>Just a demo chat interface.</small>
      </article>
    </section>

    <section class="input-row">
      <textarea id="chatInput" placeholder="Write your message..." rows="1"></textarea>
      <button id="sendButton" type="button">Send</button>
    </section>
  </main>

  <script type="module" src="index.js"></script>
  <script>
    // Theme switching functionality
    const themeToggle = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;
    const chatApp = document.querySelector('.chat-app');
    
    // Initialize theme from localStorage or system preference
    function initializeTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        setTheme(savedTheme);
      } else {
        // Check system preference
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setTheme(prefersDark ? 'dark' : 'light');
      }
    }
    
    // Set theme
    function setTheme(theme) {
      const isDark = theme === 'dark';
      
      // Set data-theme attribute on html and chat-app
      htmlElement.setAttribute('data-theme', theme);
      if (chatApp) {
        chatApp.setAttribute('data-theme', theme);
      }
      
      // Update toggle button appearance
      if (themeToggle) {
        themeToggle.classList.toggle('dark', isDark);
        themeToggle.classList.toggle('light', !isDark);
      }
      
      // Save preference
      localStorage.setItem('theme', theme);
    }
    
    // Toggle theme on button click
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        const currentTheme = htmlElement.getAttribute('data-theme') || 'light';
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        setTheme(newTheme);
      });
    }
    
    // Initialize on page load
    initializeTheme();
  </script>
</body>
</html>
