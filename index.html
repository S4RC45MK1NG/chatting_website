<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chat With Your Friends!</title>
        <link rel="stylesheet" href="style.css">
    </head>

    
    <body>
        <div class="container">
            <h1>Welcome To Dresscode 🤓🤓</h1>

            <div class="login-card" id="loginCard">
                <h2>Login</h2>
                <form id="loginForm">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>

                    <label for="Room Code">Room Code</label>
                    <input type="text" id="room_code" name="Room Code" placeholder="Enter Room Code" required>

                    <button type="submit" id="JoinBtn">Join Room</button>
                </form>
                <div id="loginMessage" aria-live="polite"></div>

            </div>

            <p aria-flowto="true">Get to chattin'!!!</p>
        </div>
        <script src="index.js"></script>
    </body>

</html>
